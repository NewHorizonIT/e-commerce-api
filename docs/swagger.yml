# ============================================
# Components
# ============================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from login response

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number

    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Items per page

    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: integer
      description: Product ID

    VariantId:
      name: variantId
      in: path
      required: true
      schema:
        type: integer
      description: Variant ID

    CategoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: integer
      description: Category ID

    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: integer
      description: Order ID

    AddressId:
      name: addressId
      in: path
      required: true
      schema:
        type: integer
      description: Shipping address ID

  responses:
    BadRequest:
      description: Bad request - validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Unauthorized - invalid or missing token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ============================================
    # Common Schemas
    # ============================================
    SuccessResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation successful

    ErrorResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total_items:
          type: integer
          example: 100
        total_pages:
          type: integer
          example: 5

    # ============================================
    # Auth Schemas
    # ============================================
    RegisterRequest:
      type: object
      required:
        - phone_num
        - password
      properties:
        phone_num:
          type: string
          pattern: '^0[0-9]{9}$'
          example: '0912345678'
          description: Vietnamese phone number (10 digits, starts with 0)
        password:
          type: string
          format: password
          minLength: 8
          example: 'SecurePass123'

    LoginRequest:
      type: object
      required:
        - phone_num
        - password
      properties:
        phone_num:
          type: string
          example: '0912345678'
        password:
          type: string
          format: password

    AuthResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                account_id:
                  type: integer
                phone_num:
                  type: string

    TokenResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                access_token:
                  type: string
                refresh_token:
                  type: string
                expires_in:
                  type: integer
                  description: Token expiration in seconds
                  example: 86400

    # ============================================
    # Profile Schemas
    # ============================================
    UserProfile:
      type: object
      properties:
        id:
          type: integer
        phone_num:
          type: string
        name:
          type: string
          nullable: true
        avatar_url:
          type: string
          format: uri
          nullable: true
        gender:
          type: boolean
          nullable: true
          description: true = male, false = female
        birth:
          type: string
          format: date
          nullable: true
        created_date:
          type: string
          format: date

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        gender:
          type: boolean
        birth:
          type: string
          format: date

    # ============================================
    # Address Schemas
    # ============================================
    ShippingAddress:
      type: object
      properties:
        id:
          type: integer
        is_default:
          type: boolean
        street_address:
          type: string
        ward:
          type: string
        province:
          type: string
        receiver_name:
          type: string
        receiver_phone:
          type: string

    CreateAddressRequest:
      type: object
      required:
        - street_address
        - ward
        - province
        - receiver_name
        - receiver_phone
      properties:
        street_address:
          type: string
          maxLength: 255
        ward:
          type: string
          maxLength: 255
        province:
          type: string
          maxLength: 255
        receiver_name:
          type: string
          maxLength: 255
        receiver_phone:
          type: string
          maxLength: 255
        is_default:
          type: boolean
          default: false

    UpdateAddressRequest:
      type: object
      properties:
        street_address:
          type: string
          maxLength: 255
        ward:
          type: string
          maxLength: 255
        province:
          type: string
          maxLength: 255
        receiver_name:
          type: string
          maxLength: 255
        receiver_phone:
          type: string
          maxLength: 255

    # ============================================
    # Product Schemas
    # ============================================
    ProductSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        thumbnail_url:
          type: string
          format: uri
        min_price:
          type: number
          format: decimal
        max_price:
          type: number
          format: decimal
        promotional_price:
          type: number
          format: decimal
          nullable: true
        total_sold:
          type: integer
        average_rating:
          type: number
          format: float
        review_count:
          type: integer
        category:
          $ref: '#/components/schemas/Category'

    ProductDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        total_sold:
          type: integer
        has_variant:
          type: boolean
        category:
          $ref: '#/components/schemas/Category'
        product_type:
          $ref: '#/components/schemas/ProductType'
        media:
          type: array
          items:
            $ref: '#/components/schemas/MediaFile'
        variant_groups:
          type: array
          items:
            $ref: '#/components/schemas/VariantGroup'
        variants:
          type: array
          items:
            $ref: '#/components/schemas/Variant'
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/ProductAttribute'
        review_summary:
          $ref: '#/components/schemas/ReviewSummary'

    AdminProductSummary:
      allOf:
        - $ref: '#/components/schemas/ProductSummary'
        - type: object
          properties:
            is_hidden:
              type: boolean
            total_stock:
              type: integer
            created_at:
              type: string
              format: date-time

    AdminProductDetail:
      allOf:
        - $ref: '#/components/schemas/ProductDetail'
        - type: object
          properties:
            is_hidden:
              type: boolean
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    CreateProductRequest:
      type: object
      required:
        - name
        - category_id
        - product_type_id
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
        category_id:
          type: integer
        product_type_id:
          type: integer
        has_variant:
          type: boolean
          default: false
        is_hidden:
          type: boolean
          default: true

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
        category_id:
          type: integer
        product_type_id:
          type: integer

    # ============================================
    # Variant Schemas
    # ============================================
    Variant:
      type: object
      properties:
        id:
          type: integer
        price:
          type: number
          format: decimal
        promotional_price:
          type: number
          format: decimal
          nullable: true
        stock_quantity:
          type: integer
        is_default:
          type: boolean
        image_url:
          type: string
          format: uri
          nullable: true
        variant_values:
          type: array
          items:
            $ref: '#/components/schemas/VariantValueSimple'

    VariantGroup:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        display_order:
          type: integer
        values:
          type: array
          items:
            $ref: '#/components/schemas/VariantValue'

    VariantValue:
      type: object
      properties:
        id:
          type: integer
        value:
          type: string
        image_url:
          type: string
          format: uri
          nullable: true

    VariantValueSimple:
      type: object
      properties:
        group_name:
          type: string
        value:
          type: string

    CreateVariantRequest:
      type: object
      required:
        - price
        - stock_quantity
        - variant_value_ids
      properties:
        price:
          type: number
          format: decimal
          minimum: 0
        stock_quantity:
          type: integer
          minimum: 0
        is_default:
          type: boolean
          default: false
        image_url:
          type: string
          format: uri
        variant_value_ids:
          type: array
          items:
            type: integer
          description: IDs of variant values for this combination

    UpdateVariantRequest:
      type: object
      properties:
        price:
          type: number
          format: decimal
          minimum: 0
        stock_quantity:
          type: integer
          minimum: 0
        is_default:
          type: boolean
        image_url:
          type: string
          format: uri

    CreateVariantGroupRequest:
      type: object
      required:
        - name
        - values
      properties:
        name:
          type: string
          maxLength: 255
        display_order:
          type: integer
          default: 0
        values:
          type: array
          items:
            type: object
            required:
              - value
            properties:
              value:
                type: string
                maxLength: 255
              image_url:
                type: string
                format: uri

    # ============================================
    # Category Schemas
    # ============================================
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    CategoryDetail:
      allOf:
        - $ref: '#/components/schemas/Category'
        - type: object
          properties:
            attributes:
              type: array
              items:
                $ref: '#/components/schemas/Attribute'

    ProductType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    Attribute:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        data_type:
          type: string
          enum: [string, int, bool, decimal]

    ProductAttribute:
      type: object
      properties:
        attribute_id:
          type: integer
        name:
          type: string
        value:
          type: string
        data_type:
          type: string

    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 255
        attribute_ids:
          type: array
          items:
            type: integer

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        attribute_ids:
          type: array
          items:
            type: integer

    CreateAttributeRequest:
      type: object
      required:
        - name
        - data_type
      properties:
        name:
          type: string
          maxLength: 255
        data_type:
          type: string
          enum: [string, int, bool, decimal]

    # ============================================
    # Media Schemas
    # ============================================
    MediaFile:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
          format: uri
        file_type:
          type: string
          enum: [image, video]

    # ============================================
    # Cart Schemas
    # ============================================
    Cart:
      type: object
      properties:
        id:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        subtotal:
          type: number
          format: decimal
        item_count:
          type: integer

    CartItem:
      type: object
      properties:
        id:
          type: integer
        quantity:
          type: integer
        variant:
          $ref: '#/components/schemas/CartItemVariant'
        item_total:
          type: number
          format: decimal

    CartItemVariant:
      type: object
      properties:
        id:
          type: integer
        product_id:
          type: integer
        product_name:
          type: string
        variant_name:
          type: string
        price:
          type: number
          format: decimal
        promotional_price:
          type: number
          format: decimal
          nullable: true
        stock_quantity:
          type: integer
        image_url:
          type: string
          format: uri

    AddCartItemRequest:
      type: object
      required:
        - variant_id
        - quantity
      properties:
        variant_id:
          type: integer
        quantity:
          type: integer
          minimum: 1
          maximum: 99

    # ============================================
    # Order Schemas
    # ============================================
    OrderStatus:
      type: string
      enum: [pending, confirmed, shipping, delivered, reviewed, cancelled]

    PaymentMethod:
      type: string
      enum: [cash_on_delivery, bank_transfer]

    OrderSummary:
      type: object
      properties:
        id:
          type: integer
        status:
          $ref: '#/components/schemas/OrderStatus'
        order_date:
          type: string
          format: date
        total_amount:
          type: number
          format: decimal
        is_paid:
          type: boolean
        item_count:
          type: integer
        first_item:
          type: object
          properties:
            product_name:
              type: string
            variant_name:
              type: string
            image_url:
              type: string
              format: uri

    OrderDetail:
      type: object
      properties:
        id:
          type: integer
        status:
          $ref: '#/components/schemas/OrderStatus'
        order_date:
          type: string
          format: date
        total_product_amount:
          type: number
          format: decimal
        shipping_fee:
          type: number
          format: decimal
        discount_amount:
          type: number
          format: decimal
        total_amount:
          type: number
          format: decimal
        is_paid:
          type: boolean
        payment_method:
          $ref: '#/components/schemas/PaymentMethod'
        bank_transfer_time:
          type: string
          format: date-time
          nullable: true
        bank_transfer_transaction_code:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        shipping_address:
          $ref: '#/components/schemas/ShippingAddress'
        discount_code:
          $ref: '#/components/schemas/DiscountCodeSummary'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        status_history:
          type: array
          items:
            $ref: '#/components/schemas/OrderStatusHistory'

    AdminOrderSummary:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          properties:
            customer_phone:
              type: string
            customer_name:
              type: string

    AdminOrderDetail:
      allOf:
        - $ref: '#/components/schemas/OrderDetail'
        - type: object
          properties:
            customer:
              type: object
              properties:
                id:
                  type: integer
                phone_num:
                  type: string
                name:
                  type: string

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        product_name_snapshot:
          type: string
        variant_name_snapshot:
          type: string
        price_before_discount:
          type: number
          format: decimal
        price_after_discount:
          type: number
          format: decimal
        quantity:
          type: integer
        total_amount:
          type: number
          format: decimal
        variant_id:
          type: integer
        image_url:
          type: string
          format: uri

    OrderStatusHistory:
      type: object
      properties:
        id:
          type: integer
        old_status:
          $ref: '#/components/schemas/OrderStatus'
        new_status:
          $ref: '#/components/schemas/OrderStatus'
        note:
          type: string
          nullable: true
        changed_at:
          type: string
          format: date-time

    CreateOrderRequest:
      type: object
      required:
        - shipping_address_id
        - payment_method
        - cart_item_ids
      properties:
        shipping_address_id:
          type: integer
        payment_method:
          $ref: '#/components/schemas/PaymentMethod'
        discount_code:
          type: string
        note:
          type: string
          maxLength: 255
        cart_item_ids:
          type: array
          items:
            type: integer
          description: IDs of cart items to checkout

    CheckoutPreviewRequest:
      type: object
      required:
        - shipping_address_id
        - cart_item_ids
      properties:
        shipping_address_id:
          type: integer
        discount_code:
          type: string
        cart_item_ids:
          type: array
          items:
            type: integer

    CheckoutPreview:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        shipping_address:
          $ref: '#/components/schemas/ShippingAddress'
        total_product_amount:
          type: number
          format: decimal
        shipping_fee:
          type: number
          format: decimal
        discount_amount:
          type: number
          format: decimal
        total_amount:
          type: number
          format: decimal
        discount_code:
          $ref: '#/components/schemas/DiscountCodeSummary'

    # ============================================
    # Promotion Schemas
    # ============================================
    DiscountCode:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        discount_code:
          type: string
        type:
          type: string
          enum: [fixed, percentage]
        discount_value:
          type: number
          format: decimal
        minimum_order_value:
          type: number
          format: decimal
        maximum_discount:
          type: number
          format: decimal
        maximum_usage:
          type: integer
        current_usage:
          type: integer
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        is_active:
          type: boolean
        allow_save_before:
          type: boolean

    DiscountCodeSummary:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        type:
          type: string
          enum: [fixed, percentage]
        discount_value:
          type: number
          format: decimal

    DiscountCodeValidation:
      type: object
      properties:
        valid:
          type: boolean
        discount_code:
          $ref: '#/components/schemas/DiscountCodeSummary'
        calculated_discount:
          type: number
          format: decimal

    CreateDiscountCodeRequest:
      type: object
      required:
        - name
        - discount_code
        - type
        - discount_value
        - start_time
        - end_time
      properties:
        name:
          type: string
          maxLength: 255
        discount_code:
          type: string
          maxLength: 255
        type:
          type: string
          enum: [fixed, percentage]
        discount_value:
          type: number
          format: decimal
        minimum_order_value:
          type: number
          format: decimal
          default: 0
        maximum_discount:
          type: number
          format: decimal
        maximum_usage:
          type: integer
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        is_active:
          type: boolean
          default: true
        allow_save_before:
          type: boolean
          default: false

    UpdateDiscountCodeRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        discount_value:
          type: number
          format: decimal
        minimum_order_value:
          type: number
          format: decimal
        maximum_discount:
          type: number
          format: decimal
        maximum_usage:
          type: integer
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        is_active:
          type: boolean
        allow_save_before:
          type: boolean

    PromotionProgram:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        status:
          type: string
          enum: [draft, active, inactive]
        details:
          type: array
          items:
            $ref: '#/components/schemas/PromotionDetail'

    PromotionDetail:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [fixed, percentage]
        promotion_value:
          type: number
          format: decimal
        product_limit:
          type: integer
        usage_limit_per_customer:
          type: integer
        variant:
          type: object
          properties:
            id:
              type: integer
            product_name:
              type: string
            variant_name:
              type: string
            original_price:
              type: number
              format: decimal

    CreatePromotionProgramRequest:
      type: object
      required:
        - name
        - start_time
        - end_time
      properties:
        name:
          type: string
          maxLength: 255
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        status:
          type: string
          enum: [draft, active, inactive]
          default: draft

    UpdatePromotionProgramRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        status:
          type: string
          enum: [draft, active, inactive]

    CreatePromotionDetailRequest:
      type: object
      required:
        - variant_id
        - type
        - promotion_value
      properties:
        variant_id:
          type: integer
        type:
          type: string
          enum: [fixed, percentage]
        promotion_value:
          type: number
          format: decimal
        product_limit:
          type: integer
        usage_limit_per_customer:
          type: integer

