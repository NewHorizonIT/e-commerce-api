    # Review Schemas
    # ============================================
    ProductReview:
      type: object
      properties:
        id:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        content:
          type: string
        created_at:
          type: string
          format: date-time
        seller_rating:
          type: integer
          minimum: 1
          maximum: 5
        shipping_rating:
          type: integer
          minimum: 1
          maximum: 5
