openapi: 3.0.3
info:
  title: E-Commerce API
  version: 1.0.0
  description: API documentation synchronized with the current Auth, Product, Order, Discount, and User modules.

servers:
  - url: http://localhost:4444/api/v1
    description: Development
  - url: https://e-commerce-api-production-2b7d.up.railway.app/api/v1
    description: Production

tags:
  - name: Auth
    description: Authentication and session APIs
  - name: Product Public
    description: Public product browsing APIs
  - name: Product Admin
    description: Product management APIs (requires admin role)
  - name: Order Public
    description: Public order browsing APIs
  - name: Order Admin
    description: Admin order management APIs (requires admin role)
  - name: Cart
    description: Cart management APIs
  - name: User
    description: Current user profile and address management APIs
  - name: Review
    description: Product review APIs
  - name: Payment
    description: Payment initiation and gateway callback APIs
  - name: Stats
    description: Admin statistics and dashboard APIs (requires admin role)
  - name: Discount
    description: Discount code management APIs (requires admin role)

paths:
  /auth/accounts:
    get:
      tags: [Auth]
      summary: List accounts (admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated account list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedAdminAccounts'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Auth]
      summary: Register account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterSuccessEnvelope'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/sessions:
    post:
      tags: [Auth]
      summary: Login and create session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusEnvelope'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/sessions/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using refreshToken cookie
      security:
        - refreshCookie: []
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusEnvelope'
        '400':
          description: Missing refresh token cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/sessions/current:
    get:
      tags: [Auth]
      summary: Get current session
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionInfoEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SimpleMessageError'
                  - $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Auth]
      summary: Logout current session
      security:
        - refreshCookie: []
      responses:
        '204':
          description: Logged out successfully
        '400':
          description: Missing refresh token cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/lock-user:
    patch:
      tags: [Auth]
      summary: Lock/unlock user account (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LockUnlockAccountRequest'
      responses:
        '200':
          description: Account lock status updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdminAccountResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized or not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/unlock-user:
    patch:
      tags: [Auth]
      summary: Unlock user account (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LockUnlockAccountRequest'
      responses:
        '200':
          description: Account unlocked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdminAccountResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized or not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/reset-password:
    patch:
      tags: [Auth]
      summary: Reset user password to default (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset to default
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdminAccountResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized or not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/account:
    patch:
      tags: [Auth]
      summary: Update account information (admin or account owner)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
      responses:
        '200':
          description: Account updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdminAccountResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Phone number already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me:
    get:
      tags: [User]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserProfile'

  /users/me/personal-information:
    put:
      tags: [User]
      summary: Upsert current user personal information
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertPersonalInformationRequest'
      responses:
        '200':
          description: Personal information saved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PersonalInformation'

  /users/me/addresses:
    get:
      tags: [User]
      summary: List current user shipping addresses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Shipping address list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ShippingAddress'
    post:
      tags: [User]
      summary: Create shipping address
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShippingAddressRequest'
      responses:
        '201':
          description: Shipping address created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ShippingAddress'

  /users/me/addresses/{addressId}:
    patch:
      tags: [User]
      summary: Update shipping address
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AddressId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShippingAddressRequest'
      responses:
        '200':
          description: Shipping address updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ShippingAddress'
    delete:
      tags: [User]
      summary: Delete shipping address
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AddressId'
      responses:
        '204':
          description: Shipping address deleted

  /admin/users/{accountId}:
    get:
      tags: [User]
      summary: Get user profile by account ID (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized or not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users:
    get:
      tags: [User]
      summary: List users (admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedAdminUsers'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [User]
      summary: Create/upsert user personal information (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreatePersonalInformationRequest'
      responses:
        '201':
          description: Personal information created/updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PersonalInformation'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized or not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users/personal-information:
    patch:
      tags: [User]
      summary: Update user personal information (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdatePersonalInformationRequest'
      responses:
        '200':
          description: Personal information updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PersonalInformation'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized or not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products:
    get:
      tags: [Product Public]
      summary: List public products
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/CategoryIdQuery'
        - $ref: '#/components/parameters/ProductTypeIdQuery'
        - $ref: '#/components/parameters/MinPrice'
        - $ref: '#/components/parameters/MaxPrice'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedProducts'

  /products/{productId}:
    get:
      tags: [Product Public]
      summary: Get product detail
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProductDetail'

  /products/{productId}/reviews:
    get:
      tags: [Review]
      summary: List reviews for a product
      description: Get paginated list of reviews with media (images/videos) for a specific product
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Review list for product with media attached
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedReviews'

  /reviews:
    get:
      tags: [Review]
      summary: List all reviews
      description: Get paginated list of all product reviews with optional product filtering
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: productId
          in: query
          schema:
            type: integer
            minimum: 1
          description: Filter reviews by product ID (optional)
      responses:
        '200':
          description: Paginated review list with media
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedReviews'
    post:
      tags: [Review]
      summary: Create review with optional images
      description: Create a new review for a purchased product. Can attach multiple Cloudinary images/videos. Order must be in delivered status.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
            examples:
              with_images:
                summary: Review with images
                value:
                  productId: 123
                  orderId: 456
                  accountId: 789
                  rating: 5
                  content: 'Great product! Exactly what I needed.'
                  mediaUrls:
                    - 'https://res.cloudinary.com/demo/image/upload/v1234567890/review-1.jpg'
                    - 'https://res.cloudinary.com/demo/image/upload/v1234567890/review-2.jpg'
              simple:
                summary: Review without images
                value:
                  productId: 123
                  orderId: 456
                  accountId: 789
                  rating: 4
                  content: 'Good quality'
      responses:
        '201':
          description: Review created successfully with media attached
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReviewDetail'
        '400':
          description: Invalid request (validation error, order not delivered, duplicate review)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reviews/{reviewId}:
    patch:
      tags: [Review]
      summary: Update review with optional new images
      description: Update review rating, content, or media. Can only update reviews within 7 days of creation. Providing mediaUrls replaces all existing media.
      security:
        - bearerAuth: []
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: Review ID to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReviewRequest'
            examples:
              update_rating:
                summary: Update rating only
                value:
                  rating: 4
              update_media:
                summary: Update media images
                value:
                  mediaUrls:
                    - 'https://res.cloudinary.com/demo/image/upload/v1234567890/new-photo.jpg'
              update_all:
                summary: Update rating, content, and media
                value:
                  rating: 5
                  content: 'Updated review - this is even better!'
                  mediaUrls:
                    - 'https://res.cloudinary.com/demo/image/upload/v1234567890/updated-1.jpg'
      responses:
        '200':
          description: Review updated successfully with new media
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReviewDetail'
        '400':
          description: Invalid request (validation error or review too old to update)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/{productId}/reviews/summary:
    get:
      tags: [Review]
      summary: Get rating summary and distribution for a product
      description: Get average rating, total review count, and rating distribution breakdown (5, 4, 3, 2, 1 star counts)
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Rating summary with distribution breakdown
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RatingSummary'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /categories:
    get:
      tags: [Product Public]
      summary: List categories
      responses:
        '200':
          description: Categories
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Category'

  /product-types:
    get:
      tags: [Product Public]
      summary: List product types
      responses:
        '200':
          description: Product types
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProductType'

  /admin/products:
    get:
      tags: [Product Admin]
      summary: List products for admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/CategoryIdQuery'
        - $ref: '#/components/parameters/ProductTypeIdQuery'
        - $ref: '#/components/parameters/MinPrice'
        - $ref: '#/components/parameters/MaxPrice'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
        - $ref: '#/components/parameters/IsHidden'
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedProducts'
    post:
      tags: [Product Admin]
      summary: Create product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created

  /admin/products/{productId}:
    get:
      tags: [Product Admin]
      summary: Get product detail for admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product detail
    patch:
      tags: [Product Admin]
      summary: Update product
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
    delete:
      tags: [Product Admin]
      summary: Delete product
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - name: mode
          in: query
          schema:
            type: string
            enum: [soft, hard]
      responses:
        '204':
          description: Product deleted

  /admin/products/{productId}/visibility:
    patch:
      tags: [Product Admin]
      summary: Update product visibility
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVisibilityRequest'
      responses:
        '200':
          description: Visibility updated

  /admin/products/{productId}/variants:
    post:
      tags: [Product Admin]
      summary: Create variant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
