openapi: 3.0.3
info:
  title: E-Commerce API
  version: 1.0.0
  description: API documentation synchronized with the current Auth, Product, Order, Discount, and User modules.

servers:
  - url: http://localhost:4444/api/v1
    description: Local development

tags:
  - name: Auth
    description: Authentication and session APIs
  - name: Product Public
    description: Public product browsing APIs
  - name: Product Admin
    description: Product management APIs (requires admin role)
  - name: Order Public
    description: Public order browsing APIs
  - name: Order Admin
    description: Admin order management APIs (requires admin role)
  - name: Cart
    description: Cart management APIs
  - name: User
    description: Current user profile and address management APIs
  - name: Review
    description: Product review APIs
  - name: Payment
    description: Payment initiation and gateway callback APIs

paths:
  /auth/accounts:
    post:
      tags: [Auth]
      summary: Register account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterSuccessEnvelope'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/sessions:
    post:
      tags: [Auth]
      summary: Login and create session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusEnvelope'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/sessions/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using refreshToken cookie
      security:
        - refreshCookie: []
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusEnvelope'
        '400':
          description: Missing refresh token cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/sessions/current:
    get:
      tags: [Auth]
      summary: Get current session
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionInfoEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SimpleMessageError'
                  - $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Auth]
      summary: Logout current session
      security:
        - refreshCookie: []
      responses:
        '204':
          description: Logged out successfully
        '400':
          description: Missing refresh token cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me:
    get:
      tags: [User]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserProfile'

  /users/me/personal-information:
    put:
      tags: [User]
      summary: Upsert current user personal information
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertPersonalInformationRequest'
      responses:
        '200':
          description: Personal information saved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PersonalInformation'

  /users/me/addresses:
    get:
      tags: [User]
      summary: List current user shipping addresses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Shipping address list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ShippingAddress'
    post:
      tags: [User]
      summary: Create shipping address
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShippingAddressRequest'
      responses:
        '201':
          description: Shipping address created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ShippingAddress'

  /users/me/addresses/{addressId}:
    patch:
      tags: [User]
      summary: Update shipping address
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AddressId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShippingAddressRequest'
      responses:
        '200':
          description: Shipping address updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ShippingAddress'
    delete:
      tags: [User]
      summary: Delete shipping address
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AddressId'
      responses:
        '204':
          description: Shipping address deleted

  /products:
    get:
      tags: [Product Public]
      summary: List public products
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/CategoryIdQuery'
        - $ref: '#/components/parameters/ProductTypeIdQuery'
        - $ref: '#/components/parameters/MinPrice'
        - $ref: '#/components/parameters/MaxPrice'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedProducts'

  /products/{productId}:
    get:
      tags: [Product Public]
      summary: Get product detail
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProductDetail'

  /products/{productId}/reviews:
    get:
      tags: [Review]
      summary: List reviews for a product
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Review list for product
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedReviews'

  /reviews:
    get:
      tags: [Review]
      summary: List reviews
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: productId
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Review list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedReviews'
    post:
      tags: [Review]
      summary: Create review
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Review created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReviewDetail'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reviews/{reviewId}:
    patch:
      tags: [Review]
      summary: Update review
      security:
        - bearerAuth: []
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReviewRequest'
      responses:
        '200':
          description: Review updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReviewDetail'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/{productId}/reviews/summary:
    get:
      tags: [Review]
      summary: Get rating summary by product
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Rating summary
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RatingSummary'

  /categories:
    get:
      tags: [Product Public]
      summary: List categories
      responses:
        '200':
          description: Categories
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Category'

  /product-types:
    get:
      tags: [Product Public]
      summary: List product types
      responses:
        '200':
          description: Product types
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProductType'

  /admin/products:
    get:
      tags: [Product Admin]
      summary: List products for admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/CategoryIdQuery'
        - $ref: '#/components/parameters/ProductTypeIdQuery'
        - $ref: '#/components/parameters/MinPrice'
        - $ref: '#/components/parameters/MaxPrice'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
        - $ref: '#/components/parameters/IsHidden'
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedProducts'
    post:
      tags: [Product Admin]
      summary: Create product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created

  /admin/products/{productId}:
    get:
      tags: [Product Admin]
      summary: Get product detail for admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product detail
    patch:
      tags: [Product Admin]
      summary: Update product
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
    delete:
      tags: [Product Admin]
      summary: Delete product
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - name: mode
          in: query
          schema:
            type: string
            enum: [soft, hard]
      responses:
        '204':
          description: Product deleted

  /admin/products/{productId}/visibility:
    patch:
      tags: [Product Admin]
      summary: Update product visibility
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVisibilityRequest'
      responses:
        '200':
          description: Visibility updated

  /admin/products/{productId}/variants:
    post:
      tags: [Product Admin]
      summary: Create variant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVariantRequest'
      responses:
        '201':
          description: Variant created

  /admin/products/{productId}/variants/{variantId}:
    patch:
      tags: [Product Admin]
      summary: Update variant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/VariantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVariantRequest'
      responses:
        '200':
          description: Variant updated
    delete:
      tags: [Product Admin]
      summary: Delete variant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/VariantId'
      responses:
        '204':
          description: Variant deleted

  /admin/variants/{variantId}/stock:
    patch:
      tags: [Product Admin]
      summary: Update variant stock
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VariantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVariantStockRequest'
      responses:
        '204':
          description: Stock updated

  /admin/products/{productId}/variant-groups:
    post:
      tags: [Product Admin]
      summary: Create variant group
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVariantGroupRequest'
      responses:
        '201':
          description: Variant group created

  /admin/products/{productId}/variant-groups/{groupId}:
    patch:
      tags: [Product Admin]
      summary: Update variant group
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVariantGroupRequest'
      responses:
        '204':
          description: Variant group updated

  /admin/products/{productId}/variant-groups/{groupId}/values:
    post:
      tags: [Product Admin]
      summary: Create variant value
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVariantValueRequest'
      responses:
        '201':
          description: Variant value created

  /admin/products/{productId}/variant-groups/{groupId}/values/{valueId}:
    patch:
      tags: [Product Admin]
      summary: Update variant value
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/ValueId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVariantValueRequest'
      responses:
        '204':
          description: Variant value updated
    delete:
      tags: [Product Admin]
      summary: Delete variant value
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/ValueId'
      responses:
        '204':
          description: Variant value deleted

  /admin/categories:
    get:
      tags: [Product Admin]
      summary: List categories
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Categories list
    post:
      tags: [Product Admin]
      summary: Create category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamedResourceRequest'
      responses:
        '201':
          description: Category created

  /admin/categories/{categoryId}:
    patch:
      tags: [Product Admin]
      summary: Update category
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamedResourceRequest'
      responses:
        '200':
          description: Category updated
    delete:
      tags: [Product Admin]
      summary: Delete category
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      responses:
        '204':
          description: Category deleted

  /admin/product-types:
    get:
      tags: [Product Admin]
      summary: List product types
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Product types list
    post:
      tags: [Product Admin]
      summary: Create product type
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamedResourceRequest'
      responses:
        '201':
          description: Product type created

  /admin/product-types/{productTypeId}:
    patch:
      tags: [Product Admin]
      summary: Update product type
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductTypeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamedResourceRequest'
      responses:
        '200':
          description: Product type updated
    delete:
      tags: [Product Admin]
      summary: Delete product type
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductTypeId'
      responses:
        '204':
          description: Product type deleted

  /orders:
    get:
      tags: [Order Public]
      summary: List current user's orders
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: shippingInfoId
          in: query
          schema:
            type: integer
            minimum: 1
        - name: discountCodeId
          in: query
          schema:
            type: integer
            minimum: 1
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, shipping, delivered, reviewed, cancelled]
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [orderDate, totalAmount]
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Orders list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedOrders'

    post:
      tags: [Order Public]
      summary: Create order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrderDetail'

  /orders/{orderId}:
    get:
      tags: [Order Public]
      summary: Get current user's order detail
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrderDetail'
        '403':
          description: Forbidden when accessing another user's order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/admin/orders:
    get:
      tags: [Order Admin]
      summary: List all orders (admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: accountId
          in: query
          schema:
            type: integer
            minimum: 1
        - name: shippingInfoId
          in: query
          schema:
            type: integer
            minimum: 1
        - name: discountCodeId
          in: query
          schema:
            type: integer
            minimum: 1
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, shipping, delivered, reviewed, cancelled]
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [orderDate, totalAmount]
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Orders list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedOrders'

  /orders/admin/orders/{orderId}:
    get:
      tags: [Order Admin]
      summary: Get order detail (admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrderDetail'

  /orders/admin/orders/{orderId}/status:
    patch:
      tags: [Order Admin]
      summary: Update order status
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        '200':
          description: Order status updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrderDetail'

  /carts/me:
    get:
      tags: [Cart]
      summary: Get current cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current cart
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Cart'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SimpleMessageError'
                  - $ref: '#/components/schemas/ErrorResponse'

  /carts/items:
    post:
      tags: [Cart]
      summary: Add item to cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddItemToCartRequest'
      responses:
        '201':
          description: Item added successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Cart'

  /carts/items/{variantId}:
    delete:
      tags: [Cart]
      summary: Remove cart item
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VariantId'
      responses:
        '200':
          description: Item removed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Cart'
    patch:
      tags: [Cart]
      summary: Update cart item quantity
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VariantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartItemDetailQuantity'
      responses:
        '200':
          description: Cart item quantity updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Cart'

  /payment/cod:
    post:
      tags: [Payment]
      summary: Mark COD order as paid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiatePaymentRequest'
      responses:
        '200':
          description: COD payment confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodPaymentResponse'
        '400':
          description: Invalid request or order state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /payment/vnpay/initiate:
    post:
      tags: [Payment]
      summary: Create VNPay payment URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiatePaymentRequest'
      responses:
        '200':
          description: VNPay payment URL generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VnpayInitiateResponse'
        '400':
          description: Invalid request or order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /payment/vnpay/callback:
    get:
      tags: [Payment]
      summary: VNPay return callback
      parameters:
        - name: vnp_ResponseCode
          in: query
          required: false
          schema:
            type: string
        - name: vnp_TxnRef
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: VNPay callback result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayCallbackResponse'
        '400':
          description: Payment verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /payment/momo/initiate:
    post:
      tags: [Payment]
      summary: Create MoMo payment request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiatePaymentRequest'
      responses:
        '200':
          description: MoMo payment request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MomoInitiateResponse'
        '400':
          description: Invalid request or order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /payment/momo/callback:
    get:
      tags: [Payment]
      summary: MoMo redirect callback
      parameters:
        - name: resultCode
          in: query
          required: false
          schema:
            type: integer
        - name: orderId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: MoMo callback result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayCallbackResponse'
        '400':
          description: Payment verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /payment/zalopay/initiate:
    post:
      tags: [Payment]
      summary: Create ZaloPay payment request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiatePaymentRequest'
      responses:
        '200':
          description: ZaloPay payment request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZalopayInitiateResponse'
        '400':
          description: Invalid request or order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /payment/zalopay/callback:
    post:
      tags: [Payment]
      summary: ZaloPay callback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ZalopayCallbackRequest'
      responses:
        '200':
          description: ZaloPay callback result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayCallbackResponse'
        '400':
          description: Payment verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshCookie:
      type: apiKey
      in: cookie
      name: refreshToken

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10

    Q:
      name: q
      in: query
      schema:
        type: string
        default: ''
    CategoryIdQuery:
      name: categoryId
      in: query
      schema:
        type: integer
        minimum: 1
        default: null
    ProductTypeIdQuery:
      name: productTypeId
      in: query
      schema:
        type: integer
        minimum: 1
        default: null
    MinPrice:
      name: minPrice
      in: query
      schema:
        type: number
        minimum: 0
        default: 0
    MaxPrice:
      name: maxPrice
      in: query
      schema:
        type: number
        minimum: 0
        default: 10000
    SortBy:
      name: sortBy
      in: query
      schema:
        type: string
        enum: [createdDate, price, sold]
    SortOrder:
      name: sortOrder
      in: query
      schema:
        type: string
        enum: [asc, desc]
    IsHidden:
      name: isHidden
      in: query
      schema:
        type: boolean
    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    VariantId:
      name: variantId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ValueId:
      name: valueId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    CategoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ProductTypeId:
      name: productTypeId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    CartId:
      name: cartId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    AddressId:
      name: addressId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  schemas:
    SuccessEnvelope:
      type: object
      properties:
        isSuccess:
          type: boolean
        data:
          nullable: true
        message:
          type: string
          nullable: true

    RegisterSuccessEnvelope:
      type: object
      properties:
        isSuccess:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/AuthSessionData'
        message:
          type: string
          nullable: true

    AuthStatusEnvelope:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/AuthData'

    AuthSessionInfoEnvelope:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/AuthSessionInfoData'

    AccountRole:
      type: string
      enum: [admin, user]

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        code:
          type: string
        message:
          type: string
        traceId:
          type: string
        details:
          nullable: true

    SimpleMessageError:
      type: object
      properties:
        message:
          type: string

    AuthRegisterRequest:
      type: object
      required: [phoneNum, password]
      properties:
        phoneNum:
          type: string
          pattern: '^\\d{10,15}$'
        password:
          type: string
          minLength: 8

    AuthLoginRequest:
      type: object
      required: [phoneNum, password]
      properties:
        phoneNum:
          type: string
          pattern: '^\\d{10,15}$'
        password:
          type: string

    AuthSessionData:
      type: object
      properties:
        id:
          type: integer
        phoneNum:
          type: string
        role:
          $ref: '#/components/schemas/AccountRole'
        accessToken:
          type: string
        refreshToken:
          type: string

    AuthData:
      type: object
      properties:
        id:
          type: integer
        phoneNum:
          type: string
        role:
          $ref: '#/components/schemas/AccountRole'
        accessToken:
          type: string

    AuthSessionInfoData:
      type: object
      properties:
        id:
          type: integer
        phoneNum:
          type: string
        role:
          $ref: '#/components/schemas/AccountRole'

    PersonalInformation:
      type: object
      properties:
        id:
          type: integer
        accountId:
          type: integer
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true
        gender:
          type: boolean
          nullable: true
        birth:
          type: string
          format: date
          nullable: true

    ShippingAddress:
      type: object
      properties:
        id:
          type: integer
        accountId:
          type: integer
        isDefault:
          type: boolean
        streetAddress:
          type: string
        ward:
          type: string
        province:
          type: string
        receiverName:
          type: string
        receiverPhone:
          type: string

    UserProfile:
      type: object
      properties:
        accountId:
          type: integer
        personalInformation:
          nullable: true
          $ref: '#/components/schemas/PersonalInformation'
        shippingAddresses:
          type: array
          items:
            $ref: '#/components/schemas/ShippingAddress'

    UpsertPersonalInformationRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
        avatarUrl:
          type: string
          maxLength: 255
          nullable: true
        gender:
          type: boolean
          nullable: true
        birth:
          type: string
          format: date
          nullable: true

    CreateShippingAddressRequest:
      type: object
      required: [streetAddress, ward, province, receiverName, receiverPhone]
      properties:
        isDefault:
          type: boolean
        streetAddress:
          type: string
          maxLength: 255
        ward:
          type: string
          maxLength: 255
        province:
          type: string
          maxLength: 255
        receiverName:
          type: string
          maxLength: 255
        receiverPhone:
          type: string
          pattern: '^\\d{10,15}$'

    UpdateShippingAddressRequest:
      type: object
      properties:
        isDefault:
          type: boolean
        streetAddress:
          type: string
          maxLength: 255
        ward:
          type: string
          maxLength: 255
        province:
          type: string
          maxLength: 255
        receiverName:
          type: string
          maxLength: 255
        receiverPhone:
          type: string
          pattern: '^\\d{10,15}$'

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    ProductType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    ProductSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        totalSold:
          type: integer
        hasVariant:
          type: boolean
        isHidden:
          type: boolean
        thumbnailUrl:
          type: string
          nullable: true
        averageRating:
          type: number
          format: float
        totalReviews:
          type: integer
        minPrice:
          type: number
          nullable: true
        maxPrice:
          type: number
          nullable: true
        category:
          $ref: '#/components/schemas/Category'
        productType:
          $ref: '#/components/schemas/ProductType'

    ProductVariant:
      type: object
      properties:
        id:
          type: integer
        price:
          type: number
        stockQuantity:
          type: integer
        isDefault:
          type: boolean
        imageUrl:
          type: string
          nullable: true
        valueIds:
          type: array
          items:
            type: integer

    ProductAttributeValue:
      type: object
      properties:
        id:
          type: integer
        value:
          type: string

    ProductAttribute:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        dataType:
          type: string
        values:
          type: array
          items:
            $ref: '#/components/schemas/ProductAttributeValue'

    ReviewMedia:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
        fileType:
          type: string
          enum: [image, video]

    ReviewSelectedAttribute:
      type: object
      properties:
        variantId:
          type: integer
        variantName:
          type: string
        groupId:
          type: integer
        groupName:
          type: string
        valueId:
          type: integer
        value:
          type: string
        imageUrl:
          type: string
          nullable: true

    ReviewDetail:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        idUser:
          type: integer
        accountId:
          type: integer
        username:
          type: string
        avatarUrl:
          type: string
          nullable: true
        orderId:
          type: integer
        rating:
          type: integer
        content:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        selectedAttributes:
          type: array
          items:
            $ref: '#/components/schemas/ReviewSelectedAttribute'
        media:
          type: array
          items:
            $ref: '#/components/schemas/ReviewMedia'

    PaginatedReviews:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReviewDetail'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    RatingDistribution:
      type: object
      properties:
        '5':
          type: integer
        '4':
          type: integer
        '3':
          type: integer
        '2':
          type: integer
        '1':
          type: integer

    RatingSummary:
      type: object
      properties:
        productId:
          type: integer
        averageRating:
          type: number
          format: float
        totalReviews:
          type: integer
        ratingDistribution:
          $ref: '#/components/schemas/RatingDistribution'

    CreateReviewRequest:
      type: object
      required: [productId, orderId, accountId, rating]
      properties:
        productId:
          type: integer
          minimum: 1
        orderId:
          type: integer
          minimum: 1
        accountId:
          type: integer
          minimum: 1
        rating:
          type: integer
          minimum: 1
          maximum: 5
        content:
          type: string
          maxLength: 1000
          nullable: true

    UpdateReviewRequest:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        content:
          type: string
          maxLength: 1000

    ProductDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        totalSold:
          type: integer
        hasVariant:
          type: boolean
        isHidden:
          type: boolean
        averageRating:
          type: number
          format: float
        totalReviews:
          type: integer
        categoryId:
          type: integer
        productTypeId:
          type: integer
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/ProductAttribute'
        variants:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariant'

    PaginatedProducts:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductSummary'
        page:
          type: integer
        limit:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    CreateProductRequest:
      type: object
      required: [name, categoryId, productTypeId]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 255
        totalSold:
          type: integer
          minimum: 0
        hasVariant:
          type: boolean
        isHidden:
          type: boolean
        categoryId:
          type: integer
        productTypeId:
          type: integer

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 255
        totalSold:
          type: integer
          minimum: 0
        hasVariant:
          type: boolean
        categoryId:
          type: integer
        productTypeId:
          type: integer

    UpdateVisibilityRequest:
      type: object
      required: [isHidden]
      properties:
        isHidden:
          type: boolean

    CreateVariantRequest:
      type: object
      required: [price, stockQuantity]
      properties:
        price:
          type: number
          minimum: 0
        stockQuantity:
          type: integer
          minimum: 0
        isDefault:
          type: boolean
        imageUrl:
          type: string
          format: uri
        variantValueIds:
          type: array
          items:
            type: integer

    UpdateVariantRequest:
      type: object
      properties:
        price:
          type: number
          minimum: 0
        stockQuantity:
          type: integer
          minimum: 0
        isDefault:
          type: boolean
        imageUrl:
          type: string
          format: uri
        variantValueIds:
          type: array
          items:
            type: integer

    UpdateVariantStockRequest:
      type: object
      properties:
        stockQuantity:
          type: integer
          minimum: 0
        adjustment:
          type: integer
        reason:
          type: string
          maxLength: 255
      oneOf:
        - required: [stockQuantity]
        - required: [adjustment]

    CreateVariantGroupRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
        displayOrder:
          type: integer
          minimum: 0

    UpdateVariantGroupRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        displayOrder:
          type: integer
          minimum: 0

    CreateVariantValueRequest:
      type: object
      required: [value]
      properties:
        value:
          type: string
          maxLength: 255
        imageUrl:
          type: string
          format: uri

    UpdateVariantValueRequest:
      type: object
      properties:
        value:
          type: string
          maxLength: 255
        imageUrl:
          type: string
          format: uri

    NamedResourceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255

    PaginatedOrders:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummary'
        page:
          type: integer
        limit:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    OrderSummary:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
        orderDate:
          type: string
          format: date-time
        totalProductAmount:
          type: number
        shippingFee:
          type: number
        discountAmount:
          type: number
        totalAmount:
          type: number
        isPaid:
          type: boolean

    OrderDetail:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
        orderDate:
          type: string
          format: date-time

        totalProductAmount:
          type: number
        shippingFee:
          type: number
        discountAmount:
          type: number
        totalAmount:
          type: number

        isPaid:
          type: boolean
        paymentMethod:
          type: string

        bankTransferTime:
          type: string
          format: date-time
          nullable: true
        bankTransferTransactionCode:
          type: string
          nullable: true

        note:
          type: string
          nullable: true

        accountId:
          type: integer
        shippingInfoId:
          type: integer
        discountCodeId:
          type: integer
          nullable: true

        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'

        histories:
          type: array
          items:
            $ref: '#/components/schemas/OrderStatusHistory'

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        productNameSnapshot:
          type: string
        variantNameSnapshot:
          type: string
        priceBeforeDiscount:
          type: number
        priceAfterDiscount:
          type: number
        quantity:
          type: integer
        totalAmount:
          type: number
        variantId:
          type: integer

    OrderStatusHistory:
      type: object
      properties:
        id:
          type: integer
        note:
          type: string
          nullable: true
        changedAt:
          type: string
          format: date-time
        oldStatus:
          type: string
          nullable: true
        newStatus:
          type: string

    CreateOrderRequest:
      type: object
      required: [paymentMethod, shippingInfoId, items]
      properties:
        shippingFee:
          type: number
        discountAmount:
          type: number

        paymentMethod:
          type: string
          enum: [cash_on_delivery, bank_transfer]

        note:
          type: string

        accountId:
          type: integer
          description: Ignored by server. Account is derived from access token.
        shippingInfoId:
          type: integer
        discountCodeId:
          type: integer
          nullable: true

        items:
          type: array
          items:
            type: object
            required: [variantId, quantity]
            properties:
              variantId:
                type: integer
              quantity:
                type: integer
                minimum: 1

    UpdateOrderPaymentRequest:
      type: object
      required: [isPaid, paymentMethod]
      properties:
        isPaid:
          type: boolean
        paymentMethod:
          type: string
          enum: [cash_on_delivery, bank_transfer]
        bankTransferTime:
          type: string
          format: date-time
          nullable: true
        bankTransferTransactionCode:
          type: string
          nullable: true

    UpdateOrderStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, confirmed, shipping, delivered, reviewed, cancelled]
        note:
          type: string

    CartItemQuantity:
      type: integer
      minimum: 1
      maximum: 50
      example: 1

    AddItemToCartRequest:
      type: object
      required: [variantId, quantity]
      properties:
        variantId:
          type: integer
          minimum: 1
        quantity:
          $ref: '#/components/schemas/CartItemQuantity'

    UpdateCartItemDetailQuantity:
      type: object
      required: [quantity]
      properties:
        quantity:
          $ref: '#/components/schemas/CartItemQuantity'

    InitiatePaymentRequest:
      type: object
      required: [orderId]
      properties:
        orderId:
          type: integer
          minimum: 1

    CodPaymentResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        message:
          type: string
        data:
          type: object
          properties:
            orderUpdated:
              type: object
              nullable: true

    VnpayInitiateResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        message:
          type: string
        data:
          type: object
          properties:
            paymentUrl:
              type: string
              format: uri

    MomoInitiateResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        message:
          type: string
        data:
          type: object
          additionalProperties: true

    ZalopayInitiateResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        message:
          type: string
        data:
          type: object
          properties:
            orderUrl:
              type: string
              nullable: true
            raw:
              type: object
              additionalProperties: true

    ZalopayCallbackRequest:
      type: object
      required: [data, mac]
      properties:
        data:
          type: string
          description: JSON string payload from ZaloPay
        mac:
          type: string

    GatewayCallbackResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        statusCode:
          type: integer
          example: 200
        message:
          type: string
        data:
          nullable: true

    CartItemDetail:
      type: object
      properties:
        id:
          type: integer
        quantity:
          $ref: '#/components/schemas/CartItemQuantity'
        cartId:
          type: integer
        variantId:
          type: integer

    Cart:
      type: object
      properties:
        id:
          type: integer
        accountId:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemDetail'
