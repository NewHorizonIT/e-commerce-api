openapi: 3.0.3
info:
  title: E-Commerce API
  version: 1.0.0
  description: API documentation synchronized with currently implemented Auth and Product modules.

servers:
  - url: http://localhost:3000/api/v1
    description: Local development

tags:
  - name: Auth
    description: Authentication and session APIs
  - name: Product Public
    description: Public product browsing APIs
  - name: Product Admin
    description: Product management APIs (requires access token)
  - name: Cart 
    description: Cart management APIs

paths:
  /auth/accounts:
    post:
      tags: [Auth]
      summary: Register account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterSuccessEnvelope'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/sessions:
    post:
      tags: [Auth]
      summary: Login and create session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusEnvelope'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/sessions/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using refreshToken cookie
      security:
        - refreshCookie: []
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusEnvelope'
        '400':
          description: Missing refresh token cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/sessions/current:
    get:
      tags: [Auth]
      summary: Get current session
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SimpleMessageError'
                  - $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Auth]
      summary: Logout current session
      security:
        - refreshCookie: []
      responses:
        '204':
          description: Logged out successfully
        '400':
          description: Missing refresh token cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products:
    get:
      tags: [Product Public]
      summary: List public products
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/CategoryIdQuery'
        - $ref: '#/components/parameters/ProductTypeIdQuery'
        - $ref: '#/components/parameters/MinPrice'
        - $ref: '#/components/parameters/MaxPrice'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedProducts'

  /products/{productId}:
    get:
      tags: [Product Public]
      summary: Get product detail
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProductDetail'

  /categories:
    get:
      tags: [Product Public]
      summary: List categories
      responses:
        '200':
          description: Categories
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Category'

  /product-types:
    get:
      tags: [Product Public]
      summary: List product types
      responses:
        '200':
          description: Product types
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProductType'

  /admin/products:
    get:
      tags: [Product Admin]
      summary: List products for admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/CategoryIdQuery'
        - $ref: '#/components/parameters/ProductTypeIdQuery'
        - $ref: '#/components/parameters/MinPrice'
        - $ref: '#/components/parameters/MaxPrice'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
        - $ref: '#/components/parameters/IsHidden'
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedProducts'
    post:
      tags: [Product Admin]
      summary: Create product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created

  /admin/products/{productId}:
    get:
      tags: [Product Admin]
      summary: Get product detail for admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product detail
    patch:
      tags: [Product Admin]
      summary: Update product
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
    delete:
      tags: [Product Admin]
      summary: Delete product
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - name: mode
          in: query
          schema:
            type: string
            enum: [soft, hard]
      responses:
        '204':
          description: Product deleted

  /admin/products/{productId}/visibility:
    patch:
      tags: [Product Admin]
      summary: Update product visibility
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVisibilityRequest'
      responses:
        '200':
          description: Visibility updated

  /admin/products/{productId}/variants:
    post:
      tags: [Product Admin]
      summary: Create variant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVariantRequest'
      responses:
        '201':
          description: Variant created

  /admin/products/{productId}/variants/{variantId}:
    patch:
      tags: [Product Admin]
      summary: Update variant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/VariantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVariantRequest'
      responses:
        '200':
          description: Variant updated
    delete:
      tags: [Product Admin]
      summary: Delete variant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/VariantId'
      responses:
        '204':
          description: Variant deleted

  /admin/variants/{variantId}/stock:
    patch:
      tags: [Product Admin]
      summary: Update variant stock
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VariantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVariantStockRequest'
      responses:
        '204':
          description: Stock updated

  /admin/products/{productId}/variant-groups:
    post:
      tags: [Product Admin]
      summary: Create variant group
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVariantGroupRequest'
      responses:
        '201':
          description: Variant group created

  /admin/products/{productId}/variant-groups/{groupId}:
    patch:
      tags: [Product Admin]
      summary: Update variant group
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVariantGroupRequest'
      responses:
        '204':
          description: Variant group updated

  /admin/products/{productId}/variant-groups/{groupId}/values:
    post:
      tags: [Product Admin]
      summary: Create variant value
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVariantValueRequest'
      responses:
        '201':
          description: Variant value created

  /admin/products/{productId}/variant-groups/{groupId}/values/{valueId}:
    patch:
      tags: [Product Admin]
      summary: Update variant value
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/ValueId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVariantValueRequest'
      responses:
        '204':
          description: Variant value updated
    delete:
      tags: [Product Admin]
      summary: Delete variant value
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/ValueId'
      responses:
        '204':
          description: Variant value deleted

  /admin/categories:
    get:
      tags: [Product Admin]
      summary: List categories
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Categories list
    post:
      tags: [Product Admin]
      summary: Create category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamedResourceRequest'
      responses:
        '201':
          description: Category created

  /admin/categories/{categoryId}:
    patch:
      tags: [Product Admin]
      summary: Update category
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamedResourceRequest'
      responses:
        '200':
          description: Category updated
    delete:
      tags: [Product Admin]
      summary: Delete category
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      responses:
        '204':
          description: Category deleted

  /admin/product-types:
    get:
      tags: [Product Admin]
      summary: List product types
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Product types list
    post:
      tags: [Product Admin]
      summary: Create product type
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamedResourceRequest'
      responses:
        '201':
          description: Product type created

  /admin/product-types/{productTypeId}:
    patch:
      tags: [Product Admin]
      summary: Update product type
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductTypeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamedResourceRequest'
      responses:
        '200':
          description: Product type updated
    delete:
      tags: [Product Admin]
      summary: Delete product type
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductTypeId'
      responses:
        '204':
          description: Product type deleted

  /carts/me:
    get:
      tags: [Cart]
      summary: Get current cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current cart
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SimpleMessageError'
                  - $ref: '#/components/schemas/ErrorResponse'

  /carts/items:
    post:
      tags: [Cart]
      summary: Add item to cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddItemToCartRequest'
      responses:
        '201':
          description: Item added successfully
    
  /carts/{cartId}/variants/{variantId}:
    delete:
      tags: [Cart]
      summary: Remove cart item
      parameters:
        - $ref: '#/components/parameters/CartId'
        - $ref: '#/components/parameters/VariantId'
      responses:
        '204':
          description:
    patch:
      tags: [Cart]
      summary: Update cart item quantity
      parameters:
        - $ref: '#/components/parameters/CartId'
        - $ref: '#/components/parameters/VariantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartItemDetailQuantity'
      responses:
        '200':
          description: 


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshCookie:
      type: apiKey
      in: cookie
      name: refreshToken

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10

    Q:
      name: q
      in: query
      schema:
        type: string
        default: ''
    CategoryIdQuery:
      name: categoryId
      in: query
      schema:
        type: integer
        minimum: 1
        default: null
    ProductTypeIdQuery:
      name: productTypeId
      in: query
      schema:
        type: integer
        minimum: 1
        default: null
    MinPrice:
      name: minPrice
      in: query
      schema:
        type: number
        minimum: 0
        default: 0
    MaxPrice:
      name: maxPrice
      in: query
      schema:
        type: number
        minimum: 0
        default: 10000
    SortBy:
      name: sortBy
      in: query
      schema:
        type: string
        enum: [createdDate, price, sold]
    SortOrder:
      name: sortOrder
      in: query
      schema:
        type: string
        enum: [asc, desc]
    IsHidden:
      name: isHidden
      in: query
      schema:
        type: boolean
    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    VariantId:
      name: variantId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ValueId:
      name: valueId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    CategoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ProductTypeId:
      name: productTypeId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    CartId:
      name: cartId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  schemas:
    SuccessEnvelope:
      type: object
      properties:
        isSuccess:
          type: boolean
          example: true
        data:
          nullable: true
        message:
          type: string
          nullable: true

    RegisterSuccessEnvelope:
      type: object
      properties:
        isSuccess:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/AuthSessionData'
        message:
          type: string
          nullable: true

    AuthStatusEnvelope:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/AuthData'

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        code:
          type: string
        message:
          type: string
        traceId:
          type: string
        details:
          nullable: true

    SimpleMessageError:
      type: object
      properties:
        message:
          type: string

    AuthRegisterRequest:
      type: object
      required: [phoneNum, password]
      properties:
        phoneNum:
          type: string
          pattern: '^\\d{10,15}$'
        password:
          type: string
          minLength: 8

    AuthLoginRequest:
      type: object
      required: [phoneNum, password]
      properties:
        phoneNum:
          type: string
          pattern: '^\\d{10,15}$'
        password:
          type: string

    AuthSessionData:
      type: object
      properties:
        id:
          type: integer
        phoneNum:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string

    AuthData:
      type: object
      properties:
        id:
          type: integer
        phoneNum:
          type: string
        accessToken:
          type: string

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    ProductType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    ProductSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        totalSold:
          type: integer
        hasVariant:
          type: boolean
        isHidden:
          type: boolean
        minPrice:
          type: number
          nullable: true
        maxPrice:
          type: number
          nullable: true
        category:
          $ref: '#/components/schemas/Category'
        productType:
          $ref: '#/components/schemas/ProductType'

    ProductVariant:
      type: object
      properties:
        id:
          type: integer
        price:
          type: number
        stockQuantity:
          type: integer
        isDefault:
          type: boolean
        imageUrl:
          type: string
          nullable: true
        valueIds:
          type: array
          items:
            type: integer

    ProductDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        totalSold:
          type: integer
        hasVariant:
          type: boolean
        isHidden:
          type: boolean
        categoryId:
          type: integer
        productTypeId:
          type: integer
        variants:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariant'

    PaginatedProducts:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductSummary'
        page:
          type: integer
        limit:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    CreateProductRequest:
      type: object
      required: [name, categoryId, productTypeId]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 255
        totalSold:
          type: integer
          minimum: 0
        hasVariant:
          type: boolean
        isHidden:
          type: boolean
        categoryId:
          type: integer
        productTypeId:
          type: integer

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 255
        totalSold:
          type: integer
          minimum: 0
        hasVariant:
          type: boolean
        categoryId:
          type: integer
        productTypeId:
          type: integer

    UpdateVisibilityRequest:
      type: object
      required: [isHidden]
      properties:
        isHidden:
          type: boolean

    CreateVariantRequest:
      type: object
      required: [price, stockQuantity]
      properties:
        price:
          type: number
          minimum: 0
        stockQuantity:
          type: integer
          minimum: 0
        isDefault:
          type: boolean
        imageUrl:
          type: string
          format: uri
        variantValueIds:
          type: array
          items:
            type: integer

    UpdateVariantRequest:
      type: object
      properties:
        price:
          type: number
          minimum: 0
        stockQuantity:
          type: integer
          minimum: 0
        isDefault:
          type: boolean
        imageUrl:
          type: string
          format: uri
        variantValueIds:
          type: array
          items:
            type: integer

    UpdateVariantStockRequest:
      type: object
      properties:
        stockQuantity:
          type: integer
          minimum: 0
        adjustment:
          type: integer
        reason:
          type: string
          maxLength: 255
      oneOf:
        - required: [stockQuantity]
        - required: [adjustment]

    CreateVariantGroupRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
        displayOrder:
          type: integer
          minimum: 0

    UpdateVariantGroupRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        displayOrder:
          type: integer
          minimum: 0

    CreateVariantValueRequest:
      type: object
      required: [value]
      properties:
        value:
          type: string
          maxLength: 255
        imageUrl:
          type: string
          format: uri

    UpdateVariantValueRequest:
      type: object
      properties:
        value:
          type: string
          maxLength: 255
        imageUrl:
          type: string
          format: uri

    NamedResourceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
    
    CartItemQuantity:
      type: integer
      minimum: 1
      maximum: 50
      example: 1
    
    AddItemToCartRequest:
      type: object
      required: [variantId, quantity]
      properties:
        variantId:
          type: integer
          minimum: 1
        quantity:
          $ref: '#/components/schemas/CartItemQuantity' 
    
    UpdateCartItemDetailQuantity:
      type: object
      required: [quantity]
      properties:
        quantity:
          $ref: '#/components/schemas/CartItemQuantity' 



