        '201':
          description: Discount created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DiscountDetail'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized or not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/discounts/{discountId}:
    get:
      tags: [Discount]
      summary: Get discount by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DiscountId'
      responses:
        '200':
          description: Discount detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DiscountDetail'
        '401':
          description: Unauthorized or not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Discount not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags: [Discount]
      summary: Update discount
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DiscountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDiscountRequest'
      responses:
        '200':
          description: Discount updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DiscountDetail'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized or not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Discount not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/discounts/{discountId}/active:
    patch:
      tags: [Discount]
      summary: Activate or deactivate discount
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DiscountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDiscountActiveRequest'
      responses:
        '200':
          description: Discount active state updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DiscountDetail'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized or not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Discount not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshCookie:
      type: apiKey
      in: cookie
      name: refreshToken

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10

    StatsFrom:
      name: from
      in: query
      schema:
        type: string
        format: date
      description: Start date for the stats range

    StatsTo:
      name: to
      in: query
      schema:
        type: string
        format: date
      description: End date for the stats range

    StatsGroupBy:
      name: groupBy
      in: query
      schema:
        type: string
        enum: [day, week, month]
        default: day

    StatsLimit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10

    StatsProductId:
      name: productId
      in: query
      schema:
        type: integer
        minimum: 1

    Q:
      name: q
      in: query
      schema:
        type: string
        default: ''
    CategoryIdQuery:
      name: categoryId
      in: query
      schema:
        type: integer
        minimum: 1
        default: null
    ProductTypeIdQuery:
      name: productTypeId
      in: query
      schema:
        type: integer
        minimum: 1
        default: null
    MinPrice:
      name: minPrice
      in: query
      schema:
        type: number
        minimum: 0
        default: 0
    MaxPrice:
      name: maxPrice
      in: query
      schema:
        type: number
        minimum: 0
        default: 10000
    SortBy:
      name: sortBy
      in: query
      schema:
        type: string
        enum: [createdDate, price, sold]
    SortOrder:
      name: sortOrder
      in: query
      schema:
        type: string
        enum: [asc, desc]
    IsHidden:
      name: isHidden
      in: query
      schema:
        type: boolean
    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    VariantId:
      name: variantId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ValueId:
      name: valueId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    CategoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ProductTypeId:
      name: productTypeId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    CartId:
      name: cartId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    AddressId:
      name: addressId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

    DiscountId:
      name: discountId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

    DiscountCode:
      name: code
      in: path
      required: true
      schema:
        type: string

  schemas:
    SuccessEnvelope:
      type: object
      properties:
        isSuccess:
          type: boolean
        data:
          nullable: true
        message:
          type: string
          nullable: true

    RegisterSuccessEnvelope:
      type: object
      properties:
        isSuccess:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/AuthSessionData'
        message:
          type: string
          nullable: true

    AuthStatusEnvelope:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/AuthData'

    AuthSessionInfoEnvelope:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/AuthSessionInfoData'

    AccountRole:
      type: string
      enum: [admin, user]

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        code:
          type: string
        message:
          type: string
        traceId:
          type: string
        details:
          nullable: true

    SimpleMessageError:
      type: object
      properties:
        message:
          type: string

    AuthRegisterRequest:
      type: object
      required: [phoneNum, password]
      properties:
        phoneNum:
          type: string
          pattern: '^\\d{10,15}$'
        password:
          type: string
          minLength: 8

    AuthLoginRequest:
      type: object
      required: [phoneNum, password]
      properties:
        phoneNum:
          type: string
          pattern: '^\\d{10,15}$'
        password:
          type: string

    LockUnlockAccountRequest:
      type: object
      required: [accountId, isLocked]
      properties:
        accountId:
          type: integer
          minimum: 1
        isLocked:
          type: boolean

    ResetPasswordRequest:
      type: object
      required: [accountId]
      properties:
        accountId:
          type: integer
          minimum: 1

    UpdateAccountRequest:
      type: object
      required: [accountId]
      properties:
        accountId:
          type: integer
          minimum: 1
        phoneNum:
          type: string
          pattern: '^\\d{10,15}$'
          nullable: true
        password:
          type: string
          minLength: 8
          nullable: true
        role:
          type: string
          enum: [admin, user]
          nullable: true

    AdminAccountResponse:
      type: object
      properties:
        id:
          type: integer
        phoneNum:
          type: string
        role:
          type: string
          enum: [admin, user]
        isLocked:
          type: boolean
        createdDate:
          type: string
          format: date-time
          nullable: true

    AdminUserSummary:
      type: object
      properties:
        id:
          type: integer
        phoneNum:
          type: string
        role:
          type: string
          enum: [admin, user]
        isLocked:
          type: boolean
        createdDate:
          type: string
          format: date-time
          nullable: true

    PaginatedAdminUsers:
